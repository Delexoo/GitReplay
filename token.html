<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub token — GitReplay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="prompt-page">
    <header class="navbar navbar-prompt">
      <div class="navbar-inner">
        <a class="navbar-brand" href="welcome.html">
          <span class="logo">GitReplay</span>
        </a>
      </div>
    </header>

    <div id="error-banner" class="error-banner hidden"></div>

    <main class="welcome">
      <div class="welcome-screen">
        <h1 class="welcome-heading" id="welcome-token-heading">GitHub token</h1>
        <p class="welcome-lead" id="welcome-token-sub">Optional. Stored in this tab only — cleared when you close it.</p>
        <div class="welcome-bar">
          <input
            id="token-input"
            type="password"
            placeholder="ghp_..."
            autocomplete="off"
            spellcheck="false"
            aria-label="GitHub personal access token"
          />
          <button id="token-btn" type="button" class="btn btn-primary">Save</button>
        </div>
        <p class="welcome-note">
          <a href="https://github.com/settings/tokens/new" target="_blank" rel="noopener">Create a token</a>
          <span aria-hidden="true">·</span>
          no scopes required
        </p>
        <a id="token-back-link" class="welcome-back" href="welcome.html">Back</a>
      </div>
    </main>

    <script type="module" src="js/token-page.js"></script>
  </body>
</html>
