# Render blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: gitreplay
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        sync: false
